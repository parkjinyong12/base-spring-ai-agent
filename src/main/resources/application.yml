spring:
  application:
    name: base-spring-ai-agent
  datasource:
    url: jdbc:postgresql://ep-misty-art-aojeus65.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require
    username: neondb_owner
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  # spring.ai 자동 설정 비활성화 - API 키는 DB에서 직접 관리
  ai:
    anthropic:
      api-key: disabled
    openai:
      api-key: disabled

server:
  port: 8080
